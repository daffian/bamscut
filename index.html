<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BAMSCUT - POS Barbershop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: { DEFAULT: '#D4AF37', light: '#F0D060', dark: '#B8860B' },
            dark: { DEFAULT: '#111111', light: '#1a1a1a', lighter: '#2a2a2a' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.5s ease-out; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .spin-slow { animation: spin-slow 3s linear infinite; }
  </style>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center">
  <div class="text-center fade-in">
    <div class="mb-6">
      <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-gradient-to-br from-gold to-gold-dark mb-4">
        <svg class="w-12 h-12 text-dark spin-slow" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-gold mb-2">BAMSCUT</h1>
      <p class="text-gray-400">Premium Barbershop POS</p>
    </div>
    <div class="flex items-center justify-center space-x-2 text-gray-400">
      <svg class="animate-spin h-5 w-5 text-gold" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span>Memuat aplikasi...</span>
    </div>
  </div>

  <script>
    // Check session and redirect
    const session = localStorage.getItem('bamscut_session');
    if (session) {
      const user = JSON.parse(session);
      if (user.role === 'Admin') {
        window.location.href = 'admin.html';
      } else if (user.role === 'Petugas') {
        window.location.href = 'petugas.html';
      } else {
        localStorage.removeItem('bamscut_session');
        window.location.href = 'login.html';
      }
    } else {
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    }
  </script>
</body>
</html>
